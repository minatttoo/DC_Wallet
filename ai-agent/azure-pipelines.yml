trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - ai-agent/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - ai-agent/**

variables:
  nodeVersion: '20.x'
  backendDir: '$(Build.SourcesDirectory)/ai-agent/backend'
  frontendDir: '$(Build.SourcesDirectory)/ai-agent/frontend'

stages:
  # ─── CI ────────────────────────────────────────────────────────────────────
  - stage: CI
    displayName: 'Build & Test'
    jobs:
      - job: BackendCI
        displayName: 'Backend — build & test'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
            displayName: 'Install Node.js'

          - script: npm ci
            workingDirectory: $(backendDir)
            displayName: 'npm ci (backend)'

          - script: npm run lint
            workingDirectory: $(backendDir)
            displayName: 'Lint'
            continueOnError: true

          - script: npm run build
            workingDirectory: $(backendDir)
            displayName: 'TypeScript build'

          - script: npm test -- --ci --coverage
            workingDirectory: $(backendDir)
            displayName: 'Unit tests'

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(backendDir)/junit.xml'
            displayName: 'Publish test results'
            condition: always()

      - job: FrontendCI
        displayName: 'Frontend — build'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
            displayName: 'Install Node.js'

          - script: npm ci
            workingDirectory: $(frontendDir)
            displayName: 'npm ci (frontend)'

          - script: npm run build
            workingDirectory: $(frontendDir)
            displayName: 'Vite build'

  # ─── Docker build & push ───────────────────────────────────────────────────
  - stage: Docker
    displayName: 'Docker Build & Push'
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DockerBuildPush
        displayName: 'Build and push Docker images'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: Docker@2
            displayName: 'Build & push backend image'
            inputs:
              containerRegistry: '$(dockerServiceConnection)'
              repository: 'personal-ai-agent/backend'
              command: 'buildAndPush'
              Dockerfile: '$(backendDir)/Dockerfile'
              buildContext: '$(backendDir)'
              tags: |
                $(Build.BuildId)
                latest

          - task: Docker@2
            displayName: 'Build & push frontend image'
            inputs:
              containerRegistry: '$(dockerServiceConnection)'
              repository: 'personal-ai-agent/frontend'
              command: 'buildAndPush'
              Dockerfile: '$(frontendDir)/Dockerfile'
              buildContext: '$(frontendDir)'
              tags: |
                $(Build.BuildId)
                latest

  # ─── Deploy to Azure Container Apps ───────────────────────────────────────
  - stage: Deploy
    displayName: 'Deploy to Azure'
    dependsOn: Docker
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployToAzure
        displayName: 'Deploy to Azure Container Apps'
        environment: 'production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: 'Deploy backend to Azure Container Apps'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az containerapp update \
                        --name personal-ai-agent-backend \
                        --resource-group $(azureResourceGroup) \
                        --image $(containerRegistry)/personal-ai-agent/backend:$(Build.BuildId)

                - task: AzureCLI@2
                  displayName: 'Deploy frontend to Azure Container Apps'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az containerapp update \
                        --name personal-ai-agent-frontend \
                        --resource-group $(azureResourceGroup) \
                        --image $(containerRegistry)/personal-ai-agent/frontend:$(Build.BuildId)
